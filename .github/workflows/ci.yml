name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore trivia-game.sln

      - name: Build
        run: dotnet build trivia-game.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test trivia-game.sln --no-build --configuration Release --verbosity normal

  integration-test:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r Tests/requirements.txt

      - name: Run integration tests
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: python Tests/test_game.py
